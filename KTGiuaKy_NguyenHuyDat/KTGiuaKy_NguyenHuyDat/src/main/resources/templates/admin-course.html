<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"> <head>
    <meta charset="UTF-8">
    <title>Admin - Quản lý khóa học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Quản lý khóa học</h2>
            <a href="/admin/create" class="btn btn-light btn-sm fw-bold">+ Thêm khóa học mới</a>
        </div>

        <div class="card-body">
            <table class="table table-hover table-bordered bg-white">
                <thead class="table-dark">
                <tr>
                    <th>Tên khóa học</th>
                    <th style="width: 150px;">Số tín chỉ</th>
                    <th>Giảng viên</th>
                    <th style="width: 200px;" class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${courses}">
                    <td th:text="${c.name}" class="fw-bold"></td>
                    <td th:text="${c.credits}"></td>
                    <td th:text="${c.lecturer}"></td>
                    <td class="text-center">
                        <a th:href="@{/admin/edit/{id}(id=${c.id})}"
                           class="btn btn-warning btn-sm">Sửa</a>

                        <a th:href="@{/admin/delete/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc chắn muốn xóa không?')">Xóa</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(courses)}">
                    <td colspan="4" class="text-center text-muted">Chưa có khóa học nào được tạo.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer text-end">
            <a href="/home" class="btn btn-secondary btn-sm">Quay lại trang chủ</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
