<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .course-card { transition: transform 0.2s; }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .course-img { height: 200px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">
<a href="/home">Home</a> |

<a href="/admin/courses">Admin Courses</a> |

<a href="/register">Register</a> |

<a href="/login">Login</a> |

<a href="/my-courses">My Courses</a>
<div class="container py-5">
    <h1 class="text-center mb-5 text-primary">Danh Sách Khóa Học</h1>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="c : ${courses.content}">
            <div class="card h-100 course-card">
                <img th:src="@{/images/{img}(img=${c.image})}" class="card-img-top course-img" alt="Course Image">

                <div class="card-body">
                    <h5 class="card-title text-truncate" th:text="${c.name}">Course Name</h5>
                    <p class="card-text mb-1">
                        <strong>Giảng viên:</strong> <span th:text="${c.lecturer}"></span>
                    </p>
                    <p class="card-text">
                        <strong>Số tín chỉ:</strong> <span class="badge bg-info text-dark" th:text="${c.credits}">0</span>
                    </p>
                </div>

                <div class="card-footer bg-transparent border-top-0 pb-3">
                    <a th:href="@{/enroll/{id}(id=${c.id})}" class="btn btn-outline-primary w-100">Đăng ký học</a>
                </div>
            </div>
        </div>
    </div>

    <nav aria-label="Page navigation" class="mt-5">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${!courses.hasPrevious()} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${courses.number - 1})}">Trước</a>
            </li>

            <li class="page-item disabled">
                <span class="page-link text-dark">
                    Trang <span th:text="${courses.number + 1}">1</span> / <span th:text="${courses.totalPages}">1</span>
                </span>
            </li>

            <li class="page-item" th:classappend="${!courses.hasNext()} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${courses.number + 1})}">Sau</a>
            </li>

        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
